# ============================================
# 每日复盘模板 - 八步复盘法
# 使用方式: 复制到 daily/YYYY-MM-DD/review.yaml
# ============================================

date: "YYYY-MM-DD"
weekday: ""  # 周一~周五
market: "A股"  # A股 / 港股

# ==========================================
# 第一步：大盘分析
# ==========================================
market_overview:
  # 指数数据
  indices:
    shanghai:  # 上证指数
      close: 0
      change_pct: 0
      volume_billion: 0  # 成交额（亿）
    shenzhen:  # 深证成指
      close: 0
      change_pct: 0
    chinext:  # 创业板指
      close: 0
      change_pct: 0
    star50:  # 科创50
      close: 0
      change_pct: 0

  # 两市成交额
  total_volume:
    amount_billion: 0  # 两市总成交额（亿）
    vs_yesterday: ""  # 放量/缩量/持平
    vs_5day_avg: ""  # 高于/低于/持平 5日均量
    vs_20day_avg: ""  # 高于/低于/持平 20日均量

  # 大盘方向判断
  direction:
    trend: ""  # 主升 / 震荡 / 下降
    ma5w_position: ""  # 5周均线上 / 5周均线下
    key_support: 0  # 关键支撑位
    key_resistance: 0  # 关键压力位

  # 大盘节点判断
  node:
    current: ""  # 当前处于什么节点（如：止跌反弹、突破、回踩、高位震荡等）
    expectation: ""  # 下一步预期

  # 仓位锚定（基于成交额）
  position_anchor:
    suggested_position: ""  # 建议仓位比例（如：3成、5成、满仓）
    reason: ""

# ==========================================
# 第二步：板块梳理
# ==========================================
sectors:
  # 主线板块
  main_theme:
    name: ""  # 当前主线名称
    status: ""  # 持续 / 分歧 / 切换中
    duration_days: 0  # 已持续天数
    key_stocks: []  # 主线核心票
    node: ""  # 板块节奏（超跌/启动/加速/主升/首次分歧/震荡/轮动）

  # 行情类型
  market_type:
    style: ""  # 趋势行情 / 连板行情
    incremental_or_stock: ""  # 增量 / 存量（趋势行情时填写）
    mid_cap_strength: ""  # 中军强度（强/走弱/弱）——中军走弱则增量变存量

  # 当日最强板块
  strongest_today:
    - name: ""
      reason: ""  # 为什么强
      vs_index: ""  # 顺指数 / 逆指数
      node: ""  # 启动位置 / 主升 / 高潮 等
      volume_trend: ""  # 放量 / 缩量
      recognition: ""  # 辨识度（高/中/低）
      key_stocks: []

  # 异动板块
  unusual_sectors:
    - name: ""
      trigger: ""  # 触发原因
      start_position: ""  # 启动位置（低位首板/趋势加速/超跌反弹等）
      volume: ""
      key_stocks: []

  # 成交量集中度
  volume_concentration:
    top_sectors: []  # 成交量集中的板块
    top_stocks: []  # 成交量集中的个股
    is_concentrated: false  # 是否出现缩量集中

# ==========================================
# 第三步：情绪周期定位
# ==========================================
emotion_cycle:
  # 整体情绪阶段
  phase: ""  # 启动 / 发酵 / 高潮 / 分歧 / 衰退
  sub_cycle: ""  # 第一周期/第二周期/第三周期/第四周期（如可判断）

  # 情绪指标
  indicators:
    limit_up_count: 0  # 涨停家数
    limit_down_count: 0  # 跌停家数
    seal_rate: 0  # 封板率（%）
    broken_rate: 0  # 炸板率（%）
    highest_board: 0  # 最高连板数
    sentiment_stocks:  # 人气票/连板票表现
      - name: ""
        status: ""  # 持续 / 分歧 / 跌停 / 二波

  # 阶段连接点判断
  transition:
    current_to_next: ""  # 加强 / 减弱 / 无法判断
    confidence: ""  # 高 / 中 / 低
    reason: ""

# ==========================================
# 第四步：风格化赚钱效应
# ==========================================
style_analysis:
  # 当前市场审美偏好
  current_preference:
    cap_size: ""  # 大盘股 / 中盘股 / 小盘股
    style: ""  # 基本面 / 情绪面 / 趋势 / 连板
    trend_or_board: ""  # 趋势票主导 / 连板票主导

  # 各风格赚钱效应
  profit_effects:
    new_theme_first_board:
      effect: ""  # 正 / 负 / 中性
      note: ""
    board_20cm_premium:  # 20cm首板溢价
      avg_premium_pct: 0
      effect: ""
    second_board_premium:  # 二板涨停溢价
      avg_premium_pct: 0
      effect: ""
    board_30cm_premium:  # 30cm首板溢价
      avg_premium_pct: 0
      effect: ""
    consecutive_board:  # 连板赚钱效应
      effect: ""
      note: ""
    big_cap_stocks:  # 容量票赚钱效应
      effect: ""
      note: ""
    first_open_from_limit:  # 涨停一字首次开板
      effect: ""
      note: ""

  # 异动监管反馈
  regulatory_feedback: ""

# ==========================================
# 第五步：龙头/最票识别
# ==========================================
leaders:
  # 当前辨识度最高的最票
  top_leaders:
    - stock: ""
      sector: ""
      attribute: ""  # 什么属性的最（走势引领/最先板/最高标/容量最大等）
      clarity: ""  # 清晰度（一眼看出/需要辨别/不清晰）
      position: ""  # 当前位置（启动/主升/高位/分歧）
      is_new_leader: false  # 是否新最

  # 龙头更替观察
  leader_transition:
    old_leader: ""
    new_leader: ""
    reason: ""

# ==========================================
# 第六步：节点判断
# ==========================================
nodes:
  market_node: ""  # 大盘节点
  sector_node: ""  # 板块节点
  style_node: ""  # 风格化节点
  overall_assessment: ""  # 综合节点评估

# ==========================================
# 第七步：持仓检视
# ==========================================
positions:
  - stock: ""
    cost: 0
    current_price: 0
    position_pct: 0  # 仓位占比（%）
    in_hot_sector: false  # 是否在热点板块
    # 非热点票额外关注
    price_trend: ""  # 上涨 / 下跌
    volume_vs_avg: ""  # 成交量 vs 均量线（以上/以下）
    amplitude_ok: false  # 振幅是否满足
    action_plan: ""  # 操作计划

# ==========================================
# 第八步：次日计划
# ==========================================
next_day_plan:
  # 三位一体重点因子
  key_factor: ""  # 当前最重要的因子是什么
  secondary_factors: []  # 次要因子

  # 关注方向
  watch_directions:
    - direction: ""
      reason: ""
      target_stocks: []
      entry_condition: ""  # 什么条件下介入

  # 风险提示
  risks:
    - description: ""
      impact: ""  # 高 / 中 / 低

  # 操作纪律
  discipline:
    max_position: ""  # 最大仓位
    stop_loss_rule: ""  # 止损规则
    note: ""

# ==========================================
# 综合结论
# ==========================================
summary:
  one_sentence: ""  # 一句话总结当日市场
  trinity_conclusion: ""  # 三位一体综合结论
  confidence: ""  # 对次日判断的信心（高/中/低/看不懂）
