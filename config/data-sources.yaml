# ============================================
# 数据源配置与置信度规范
# ============================================

# ==========================================
# 一、数据分类与来源
# ==========================================

# 【可自动获取】—— 不需要手动录入
auto_collectable:
  # --- 行情数据 ---
  market_data:
    source: "akshare / 东方财富API"
    items:
      - "上证指数/深证成指/创业板指/科创50 收盘价、涨跌幅"
      - "两市总成交额"
      - "北向资金净流入/流出"
      - "沪深港通资金流向"
      - "个股日K数据（开高低收、成交量、成交额、换手率）"
      - "均线数据（5/10/20/60日均线、5周均线）"
    refresh: "盘后自动"
    confidence: "事实-高"

  # --- 涨跌停数据 ---
  limit_data:
    source: "akshare / 东方财富"
    items:
      - "涨停家数、跌停家数"
      - "涨停封板率、炸板率"
      - "连板股列表（含连板天数）"
      - "最高连板数"
      - "涨停股明细（代码、名称、板块、首板/连板、封单额）"
      - "跌停股明细"
    refresh: "盘后自动"
    confidence: "事实-高"

  # --- 板块数据 ---
  sector_data:
    source: "akshare / 东方财富板块资金流"
    items:
      - "行业板块涨跌幅排名"
      - "概念板块涨跌幅排名"
      - "板块资金净流入排名"
      - "板块成交额排名"
      - "板块内个股涨跌分布"
    refresh: "盘后自动"
    confidence: "事实-高"

  # --- 个股公告 ---
  announcements:
    source: "巨潮资讯 cninfo / 东方财富公告"
    items:
      - "持仓股最新公告（业绩预告/快报/年报/增减持/回购/重组等）"
      - "关注池个股最新公告"
      - "全市场重大公告（停复牌、重组、增发等）"
    refresh: "盘前06:30 + 盘后18:00"
    confidence: "事实-高"

  # --- 宏观经济数据 ---
  macro_data:
    source: "akshare / 国家统计局 / 央行"
    items:
      - "PMI数据"
      - "CPI/PPI数据"
      - "社融/M2数据"
      - "LPR利率"
      - "GDP增速"
      - "外汇储备"
    refresh: "发布日自动获取"
    confidence: "事实-高"

  # --- 外盘数据 ---
  global_markets:
    source: "akshare"
    items:
      - "美股三大指数（道琼斯/纳斯达克/标普500）"
      - "恒生指数/恒生科技指数"
      - "A50期货"
      - "美元指数"
      - "人民币汇率"
      - "原油/黄金/铜等大宗商品"
      - "美国10年期国债收益率"
      - "VIX恐慌指数"
    refresh: "盘前06:30"
    confidence: "事实-高"

  # --- 融资融券 ---
  margin_data:
    source: "akshare / 交易所"
    items:
      - "两融余额"
      - "融资净买入额"
      - "个股融资融券变化"
    refresh: "盘后自动（T+1）"
    confidence: "事实-高"

  # --- 龙虎榜 ---
  dragon_tiger:
    source: "akshare / 东方财富"
    items:
      - "龙虎榜上榜股票"
      - "机构/游资买卖席位"
      - "净买入/卖出金额"
    refresh: "盘后自动"
    confidence: "事实-高"

# 【半自动获取】—— OpenClaw搜索 + 人工确认
semi_auto:
  # --- 新闻与政策 ---
  news_policy:
    source: "财联社/新华社/证监会/国务院"
    items:
      - "重大政策发布（降准降息、行业政策、监管政策）"
      - "高层讲话/会议精神"
      - "行业重大新闻（如英伟达财报、产业链事件）"
      - "监管动态（异动问询、停牌核查、窗口指导）"
    method: "OpenClaw定时搜索 + 关键词过滤"
    refresh: "盘前07:00 + 盘后17:00"
    confidence: "需标注"

  # --- 互动易/投资者关系 ---
  investor_relations:
    source: "互动易 / 上证e互动 / 深交所互动易"
    items:
      - "持仓股的最新互动问答"
      - "关注池个股的重要互动回复"
      - "热门行业相关互动"
    method: "OpenClaw按持仓/关注池自动查询"
    refresh: "盘前检查"
    confidence: "事实-中（公司回复可能含糊）"

  # --- 机构调研 ---
  research_visits:
    source: "巨潮资讯 / 东方财富 / 同花顺"
    items:
      - "持仓股近期机构调研记录"
      - "关注池个股调研记录"
      - "热门板块个股调研密度"
    method: "OpenClaw自动查询"
    refresh: "每日盘后"
    confidence: "事实-高（调研记录是事实，但调研≠看好）"

  # --- 研报摘要 ---
  research_reports:
    source: "东方财富/万得/同花顺"
    items:
      - "持仓股最新研报评级变动"
      - "行业研报核心观点"
      - "首次覆盖/上调评级"
    method: "OpenClaw搜索摘要"
    refresh: "盘前"
    confidence: "判断-中（券商观点，非事实）"

# 【需手动录入】—— 只有你能判断的
manual_only:
  items:
    - "情绪周期阶段定性（启动/发酵/高潮/分歧/衰退）"
    - "情绪阶段转换方向判断（加强/减弱）"
    - "三位一体重点因子的主观判断"
    - "最票的识别与清晰度评价"
    - "板块节奏的主观定性"
    - "风格化审美偏好的感受"
    - "个股分时走势的引领性判断"
    - "交易决策和买卖理由"
    - "诚意反包vs普通反包的感受"
    - "看得懂/看不懂的判断"
  note: "这些是体系的核心，无法也不应该自动化"

# ==========================================
# 二、置信度标注规范
# ==========================================
confidence_framework:
  # 数据类型标注
  data_types:
    fact:
      label: "[事实]"
      description: "有明确数据源、可验证的客观数据"
      examples:
        - "上证指数收盘3260.5点（来源：交易所）"
        - "海光信息发布业绩预告，净利润同比增长50%（来源：巨潮公告）"
        - "两市成交额9800亿（来源：交易所）"

    judgment:
      label: "[判断]"
      description: "基于数据和逻辑推导的分析结论"
      examples:
        - "AI板块可能进入发酵阶段（基于：连续3日资金净流入+龙头股走势）"
        - "大盘短期有回调风险（基于：成交额萎缩+均线压力）"

    rumor:
      label: "[传闻]"
      description: "未经证实的市场消息"
      examples:
        - "市场传闻某公司将获得大额订单（来源：社交媒体）"

    opinion:
      label: "[观点]"
      description: "机构或个人的主观看法"
      examples:
        - "某券商认为AI算力需求将超预期（来源：XX研报）"

  # 置信度等级
  confidence_levels:
    high:
      label: "★★★"
      criteria: "官方数据源、可重复验证、时效性强"
    medium:
      label: "★★☆"
      criteria: "可靠来源但可能有滞后、或公司回复含糊"
    low:
      label: "★☆☆"
      criteria: "社交媒体、未具名消息源、过时信息"

  # 时效性标注
  timeliness:
    realtime: "[实时]"  # 当日数据
    recent: "[近期]"  # 1-3天内
    delayed: "[滞后]"  # 超过3天
    historical: "[历史]"  # 超过1周

# ==========================================
# 三、信息标注格式示例
# ==========================================
annotation_format:
  example: |
    ## 盘前信息摘要

    ### 宏观政策
    - [事实] ★★★ [实时] 央行昨日开展1000亿MLF操作，利率维持2.50%不变
      来源：中国人民银行官网 2026-03-28
    - [判断] ★★☆ [近期] 市场预期4月可能降准，基于近期流动性偏紧+经济数据偏弱
      来源：多家券商研报综合

    ### 持仓公告
    - [事实] ★★★ [实时] 海光信息(688041)：2025年年报净利润12.3亿，同比+45%
      来源：巨潮资讯 2026-03-28
    - [事实] ★★☆ [近期] 海光信息(688041)：互动易回复"新一代产品已完成流片"
      来源：上证e互动 2026-03-27

    ### 行业动态
    - [事实] ★★★ [实时] 英伟达发布新一代GPU，性能提升40%
      来源：英伟达官方发布会
    - [观点] ★★☆ [近期] 中信证券：看好AI算力2026年资本开支继续增长
      来源：中信证券研报 2026-03-27
    - [传闻] ★☆☆ [近期] 传某国产AI芯片厂商获大额政府采购
      来源：社交媒体

# ==========================================
# 四、OpenClaw 搜索关键词配置
# ==========================================
search_keywords:
  # 盘前搜索关键词
  pre_market:
    macro: ["央行", "降准", "降息", "LPR", "MLF", "国常会", "政治局", "证监会"]
    market: ["A股", "港股", "美股", "纳斯达克", "A50期货"]
    sectors: []  # 动态填入当前主线板块关键词
    holdings: []  # 动态填入持仓股票名称

  # 盘后搜索关键词
  post_market:
    announcements: []  # 动态填入持仓+关注池股票代码
    regulation: ["问询函", "关注函", "停牌核查", "特停", "异动"]
    industry: []  # 动态填入当前关注行业
