# ============================================
# 静态宏观日历
# 每条记录对应一个具体日期的事件
# AkShare 动态日历会与本文件合并后输出到盘前简报
# ============================================
#
# 字段说明：
#   date       - 日期 YYYY-MM-DD（精确匹配，必填）
#   event      - 事件名称（必填）
#   time       - 时间（北京时间，如 "02:00"，可为空）
#   impact     - 重要性：高 / 中 / 低
#   category   - 分类：海外宏观 / 国内宏观 / A股日历 / 财报季
#   expected   - 市场预期值（可为空）
#   prior      - 前值（可为空）
#
# 使用方法：
#   在下方 events 列表中手动追加即可，程序会在盘前自动读取当天事件。
# ============================================

events:
  # --- 海外宏观示例 ---
  # - date: "2026-04-30"
  #   event: "美联储 FOMC 利率决议"
  #   time: "02:00"
  #   impact: "高"
  #   category: "海外宏观"
  #   expected: "维持 4.25%-4.50%"
  #   prior: "4.25%-4.50%"

  # --- 国内宏观示例 ---
  # - date: "2026-04-01"
  #   event: "中国3月官方制造业PMI"
  #   time: "09:30"
  #   impact: "高"
  #   category: "国内宏观"
  #   expected: "50.2"
  #   prior: "50.2"

  # --- A股日历示例 ---
  # - date: "2026-04-30"
  #   event: "年报披露截止日"
  #   time: ""
  #   impact: "中"
  #   category: "A股日历"
  #   expected: ""
  #   prior: ""
