# ============================================
# 情绪周期跟踪
# 每日更新，记录情绪周期演变
# ============================================

# 当前情绪周期状态
current_state:
  phase: ""  # 启动 / 发酵 / 高潮 / 分歧 / 衰退
  sub_cycle: ""  # 第一周期/第二周期/第三周期/第四周期
  started_date: ""  # 本阶段开始日期
  days_in_phase: 0

  # 阶段转换判断
  transition_outlook:
    direction: ""  # 加强 / 减弱 / 无法判断
    confidence: ""  # 高 / 中 / 低
    key_evidence: []

# 情绪指标历史（最近20个交易日）
daily_indicators:
  - date: ""
    limit_up: 0  # 涨停家数
    limit_down: 0  # 跌停家数
    seal_rate: 0  # 封板率（%）
    broken_rate: 0  # 炸板率（%）
    highest_board: 0  # 最高连板数
    phase: ""  # 当日情绪定性
    note: ""

# 人气票/情绪标杆票跟踪
sentiment_leaders:
  - stock: ""
    role: ""  # 连板龙头 / 人气二波 / 情绪风向标
    current_board: 0  # 当前连板数
    status: ""  # 持续 / 分歧 / 跌停 / 断板
    start_date: ""
    history: []  # 近期表现记录

# 情绪周期异化观察
# （来自第十三课：情绪周期的异化与对策）
anomalies:
  is_anomaly: false
  type: ""  # 如：周期压缩、周期延长、双周期叠加等
  description: ""
  countermeasure: ""

# 赚钱/亏钱效应强度
profit_loss_effect:
  profit_effect: ""  # 强 / 中 / 弱 / 极弱
  loss_effect: ""  # 强 / 中 / 弱 / 极弱
  net_sentiment: ""  # 偏多 / 中性 / 偏空
