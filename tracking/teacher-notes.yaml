- last_update: '2026-03-30'
  name: 小鲍
  notes:
  - date: '2026-03-30'
    obsidian_path: teacher-notes/2026/2026-03-30-小鲍四维度短线训练营.md
    title: 四维度短线训练营 - 地缘冲突下的交易框架
    tags: ["短线交易", "地缘冲突", "周期定位", "4 月 15 日红线"]
    core_view: "下行趋势未改，严控风险优先于博取收益"
    key_points:
      - "4 月 15 号业绩披露红线前：不追高、低仓位、熬过风险释放"
      - "第三周期已开启：炒新不炒旧，聚焦低位新题材（锂电、商业航天）"
      - "隔夜美股仍是 A 股情绪锚点，信号作用不可替代"
      - "潜在黑天鹅：日元加息预期（美元兑日元突破 160）"
    sectors:
      - name: "光通信"
        view: "高增长确定性最强，回调后低吸，不可追高"
      - name: "商业航天"
        view: "4-5 月密集发射窗口，跟踪排期，单次失败可能推迟全行业"
      - name: "锂电（反内卷）"
        view: "超跌修复非反转，产成品公司利好"
      - name: "铝 + 空铜对冲"
        view: "供应收缩 vs 需求下行，赚品种间强弱分化收益"
    avoid:
      - "存储板块（消费级 DDR5 价格下跌，行情尾声）"
      - "电力/化工（预计回调一个月，4 月底 -5 月再看）"
      - "所有日内追高（4 月 15 号前铁律）"
  platform: ''
  schedule: ''

- last_update: '2026-03-30'
  name: 鞠磊
  notes:
  - date: '2026-03-30'
    obsidian_path: teacher-notes/2026/2026-03-30-鞠磊周末复盘.md
    title: 周末复盘 - 成交量锚定与防守反击
    tags: ["成交量", "防守反击", "4 月时间轴", "医药消费"]
    core_view: "成交量锚定 2.3 万亿，4 月中下旬乐观，4 月末防范风险"
    key_points:
      - "上证指数缺口 3957 点已收复，短期多头胜，但需 2.3 万亿成交量支撑"
      - "4 月时间轴：中下旬乐观，中旬防地面部队推进，月末防月末效应"
      - "市场开始有承接，不被外围干扰是最好的盘面特征"
      - "防守反击三件套：医药 + 消费 + 农业"
      - "明日策略：逢低做多，算力/半导体有望卷土重来"
      - "【晚间追加】成交量 1.9 万亿+，A 股抗压能力增强；明日突破 3937 点 +2 万亿则回补缺口"
      - "【晚间追加】医药回踩 5 日线买入；商业航天分时回踩低吸；铝业别接力；锂电缩量回调可低吸"
      - "【晚间追加】美诺华（最高连板）+ 万邦德（强势）→ 医药四月行情可期"
    sectors:
      - name: "医药医疗（创新药）"
        view: "业绩驱动 + BD 出海，超跌修复非主升，回调缩量买入"
      - name: "食品饮料"
        view: "低位消费，促消费政策，逢低布局"
      - name: "算力/云服务"
        view: "需求只增不减，涨价预期，今天低吸明天补涨"
      - name: "商业航天"
        view: "4-5 月发射窗口，调整差不多了，20 日均线压力"
      - name: "有色"
        view: "黄金稳则有色好，天山铝业业绩一字板"
    avoid:
      - "电力（MACD 顶背离补跌，华电辽能跌停）"
      - "石油/燃气（高位补跌，防守型板块）"
      - "煤炭（纯防守，不具备攻中待守特性）"
      - "所有高位品种（资金高低切换）"
    position: "六成滚动仓位或一半仓位，预期放低"
  platform: ''
  schedule: ''

- last_update: '2026-03-30'
  name: 沈纯
  notes:
  - date: '2026-03-30'
    obsidian_path: teacher-notes/2026/2026-03-30-沈纯收盘总结.md
    title: "收盘总结 - 中期底部确认，新能源确定性最高"
    tags: ["脱敏钝化", "中期底部", "新能源", "锂电储能", "4 月展望"]
    core_view: "3800 点有强支撑，4 月机会较多，新能源（锂电 + 储能）确定性最高"
    key_points:
      - "上证指数连续两天低开高走守住 3900 点，外围脱敏钝化，中期底部确认"
      - "两融背离 + 微盘股强势 = 自发形成底部信号"
      - "4 月展望：经过 3 月调整后机会较多，核心找景气度向上 + 一季报改善方向"
      - "新能源确定性最高（锂电 + 储能），碳酸锂价格上涨由下游需求带动"
      - "医药连续 3 天强势有资金介入，建议 ETF 或锚定龙头"
      - "钠电池周末提示今日亮眼，鼎盛（基本面）/万顺（弹性）"
    sectors:
      - name: "锂电 + 储能"
        view: "业绩确定性高，行业景气度向上，核心配置方向"
      - name: "医药"
        view: "连续 3 天强势，美诺华五连板，建议 ETF 或锚定龙头（恒瑞/药明/信达）"
      - name: "钠电池"
        view: "鼎盛新材（份额 40%+ 比亚迪直供）/万顺新材（弹性好）"
      - name: "光伏设备"
        view: "短期破位（碳酸锂涨 + 出口退税取消），拉普拉斯 50 元附近安全区域"
    avoid:
      - "电力（强势股补跌，领跌市场）"
      - "贵金属/有色/商业航天（超跌反弹，空间有限）"
      - "单个医药股（研究难度大，建议 ETF 或龙头）"
    position: "新能源为核心配置，医药 ETF 为配置方向"
  platform: ''
  schedule: ''
