name: Web Check

on:
  push:
    paths:
      - 'web/**'
      - '.github/workflows/web-check.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-check.yml'

jobs:
  web-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: bash check.sh --web
